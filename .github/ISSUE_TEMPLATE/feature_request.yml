name: Feature Request
description: Suggest a new feature or integration
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: I want to track my Slack activity alongside my other work...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, if any.

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New collector / integration
        - Enhancement to existing collector
        - CLI improvement
        - Configuration
        - Documentation
        - Other
    validations:
      required: true
